<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartExam AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-950 text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Your Question Bank
        const questionBank = {
            Math: {
                Easy: [
                    { id: 1, question: "What is 15 + 27?", options: ["40", "42", "45", "38"], correct: 1, explanation: "15 + 27 = 42." },
                    { id: 2, question: "What is 8 × 7?", options: ["54", "56", "64", "49"], correct: 1, explanation: "8 multiplied by 7 equals 56." }
                ],
                Medium: [
                    { id: 1, question: "What is the value of x in 3x + 7 = 22?", options: ["3", "5", "6", "4"], correct: 1, explanation: "Subtract 7: 3x = 15. Divide by 3: x = 5." }
                ],
                Hard: [
                    { id: 1, question: "Solve for x: 2x² - 8x + 6 = 0", options: ["x=1,2", "x=1,3", "x=2,3", "x=3,4"], correct: 1, explanation: "Factor: 2(x-1)(x-3) = 0 → x=1 or x=3." }
                ]
            },
            Science: {
                Easy: [
                    { id: 1, question: "What planet is known as the Red Planet?", options: ["Venus", "Mars", "Jupiter", "Saturn"], correct: 1, explanation: "Mars appears red due to iron oxide on its surface." }
                ]
            }
        };

        function App() {
            const [subject, setSubject] = useState('Math');
            const [difficulty, setDifficulty] = useState('Medium');
            const [questions, setQuestions] = useState([]);
            const [userAnswers, setUserAnswers] = useState({});
            const [showResults, setShowResults] = useState(false);

            const handleGenerate = () => {
                const pool = questionBank[subject][difficulty];
                setQuestions(pool);
                setUserAnswers({});
                setShowResults(false);
            };

            const handleAnswer = (qId, idx) => {
                setUserAnswers(prev => ({ ...prev, [qId]: idx }));
            };

            return (
                <div className="min-h-screen p-6 max-w-4xl mx-auto">
                    <nav className="flex justify-between items-center mb-12 border-b border-zinc-800 pb-6">
                        <h1 className="text-3xl font-bold bg-gradient-to-r from-blue-400 to-teal-400 bg-clip-text text-transparent">SmartExam AI</h1>
                        <span className="bg-emerald-500/10 text-emerald-400 px-4 py-1 rounded-full text-sm border border-emerald-500/20">100% Free</span>
                    </nav>

                    <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 mb-8 shadow-xl">
                        <h2 className="text-xl mb-6 font-semibold">Generate Your Exam</h2>
                        <div className="grid grid-cols-2 gap-4 mb-6">
                            <select 
                                className="bg-zinc-950 border border-zinc-700 p-4 rounded-xl"
                                value={subject} onChange={(e) => setSubject(e.target.value)}
                            >
                                <option>Math</option>
                                <option>Science</option>
                            </select>
                            <select 
                                className="bg-zinc-950 border border-zinc-700 p-4 rounded-xl"
                                value={difficulty} onChange={(e) => setDifficulty(e.target.value)}
                            >
                                <option>Easy</option>
                                <option>Medium</option>
                                <option>Hard</option>
                            </select>
                        </div>
                        <button 
                            onClick={handleGenerate}
                            className="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition-all"
                        >
                            GENERATE QUESTIONS →
                        </button>
                    </div>

                    {questions.map((q, index) => (
                        <div key={q.id} className="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 mb-4">
                            <p className="text-lg mb-4 text-zinc-300">Q{index + 1}: {q.question}</p>
                            <div className="space-y-2">
                                {q.options.map((opt, i) => (
                                    <button 
                                        key={i}
                                        onClick={() => handleAnswer(q.id, i)}
                                        className={`w-full text-left p-4 rounded-xl border ${userAnswers[q.id] === i ? 'border-blue-500 bg-blue-500/10' : 'border-zinc-800 bg-zinc-950'}`}
                                    >
                                        {opt}
                                    </button>
                                ))}
                            </div>
                        </div>
                    ))}

                    {questions.length > 0 && !showResults && (
                        <button 
                            onClick={() => setShowResults(true)}
                            className="w-full py-4 bg-white text-black rounded-xl font-bold mt-4"
                        >
                            SUBMIT ANSWERS
                        </button>
                    )}

                    {showResults && (
                        <div className="mt-8 p-8 bg-emerald-500/10 border border-emerald-500/20 rounded-3xl text-center">
                            <h2 className="text-4xl font-bold text-emerald-400 mb-2">Exam Complete!</h2>
                            <p className="text-zinc-400 mb-6">Check your answers above.</p>
                            <button onClick={() => window.location.reload()} className="px-8 py-3 bg-zinc-800 rounded-xl">Try Again</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
